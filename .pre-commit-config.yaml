repos:
  - repo: local
    hooks:
      - id: isort
        name: isort
        entry: .venv/Scripts/python.exe -m isort --settings-file ./.isort.cfg app
        args: ["--profile", "black"]
        language: system
        types: [python]
        pass_filenames: false

      - id: black
        name: black
        entry: .venv/Scripts/python.exe -m black --config ./.black app
        language: system
        types: [python]
        pass_filenames: false

      - id: flake8
        name: flake8
        entry: .venv/Scripts/python.exe -m flake8 --config .flake8 app
        language: system
        types: [python]
        pass_filenames: false